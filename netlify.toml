[build]
  # Build command
  command = "rm -rf .netlify/functions-serve .netlify/functions .netlify/functions-internal && bun install --frozen-lockfile && bun run build"
  
  # Directory to publish (where the built files are located)
  publish = "dist"
  

[build.environment]
  # Node.js version
  NODE_VERSION = "20.19.0"
  
  # Set build environment
  NODE_ENV = "production"

# Build processing settings
[build.processing]
  skip_processing = false

# Build processing for CSS and JS
[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[dev]
  command = "bun dev -- --port 3173 --strictPort"
  targetPort = 3173
  port = 3000
  autoLaunch = false

# Headers for better caching and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
